<!DOCTYPE html>
<html>
<head>
    <title>Ramadan Menu Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌙 Ramadan Menu Planner ULTRA</h1>

    <p id="date"></p>
    <p id="countdown"></p>

    <button onclick="toggleMode()">🌗 Toggle Mode</button>

    <h2>Add Dish</h2>
    <input type="text" id="dishName" placeholder="Dish Name">
    <input type="number" id="calories" placeholder="Calories">
    <input type="number" id="protein" placeholder="Protein (g)">
    <input type="number" id="carbs" placeholder="Carbs (g)">
    <input type="number" id="fat" placeholder="Fat (g)">
    <button onclick="addDish()">Add</button>

    <h3>Search</h3>
    <input type="text" id="searchInput" onkeyup="searchDish()">

    <h3>Sort</h3>
    <button onclick="sortLow()">Low → High</button>
    <button onclick="sortHigh()">High → Low</button>

    <ul id="dishList"></ul>

    <h3>Total Calories: <span id="totalCalories">0</span></h3>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <h2>Ramadan Goals</h2>
    <input type="text" id="goalInput" placeholder="Enter Goal">
    <button onclick="addGoal()">Add Goal</button>
    <ul id="goalList"></ul>
    <p>Completion: <span id="goalProgress">0%</span></p>

    <h2>Dua & Motivation</h2>
    <button onclick="generateDua()">Dua</button>
    <button onclick="motivation()">Motivation</button>
    <p id="textOutput"></p>

    <button onclick="exportData()">Export Menu</button>
</div>

<script src="script.js"></script>
</body>
</html>
