<!DOCTYPE html>
<html>
<head>
    <title>Ramadan Menu Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌙 Ramadan Menu Planner Pro</h1>
    <p id="date"></p>

    <button onclick="toggleMode()">🌗 Toggle Dark Mode</button>

    <h2>⏳ Iftar Countdown</h2>
    <p id="countdown"></p>

    <h2>🥗 Add Dish</h2>
    <input type="text" id="dishName" placeholder="Dish Name">
    <input type="number" id="dishCalories" placeholder="Calories">
    <button onclick="addDish()">Add Dish</button>
    <button onclick="clearAll()">Clear All</button>

    <h3>🔎 Search Dish</h3>
    <input type="text" id="searchInput" onkeyup="searchDish()" placeholder="Search...">

    <h3>🔥 Filter</h3>
    <button onclick="filterLow()">Below 300 cal</button>
    <button onclick="showAll()">Show All</button>

    <ul id="dishList"></ul>

    <h3>Total Calories: <span id="totalCalories">0</span></h3>

    <h2>🤲 Daily Dua</h2>
    <button onclick="generateDua()">Get Dua</button>
    <p id="duaText"></p>

    <h2>💪 Motivation</h2>
    <button onclick="motivation()">Get Motivation</button>
    <p id="motivationText"></p>
</div>

<script src="script.js"></script>
</body>
</html>
