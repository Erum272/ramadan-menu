<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ramadan Kareem Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌙 Ramadan Kareem</h1>
    <p>Special Iftar & Suhoor Menu</p>

    <div class="moon">🌙</div>

    <section class="countdown">
        <h2>⏳ Time Left for Iftar</h2>
        <p id="timer">Loading...</p>
    </section>

    <button onclick="toggleMode()" class="mode-btn">Toggle Mode</button>

    <input type="text" id="search" placeholder="🔍 Search food..." onkeyup="searchMenu()">
</header>

<section class="menu">

    <div class="card">
        <img src="https://source.unsplash.com/400x250/?paratha" alt="">
        <h3>Paratha</h3>
        <p>Freshly made with butter</p>
        <button onclick="addToCart('Paratha')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x250/?samosa" alt="">
        <h3>Samosa</h3>
        <p>Crispy Ramadan snack</p>
        <button onclick="addToCart('Samosa')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x250/?haleem" alt="">
        <h3>Haleem</h3>
        <p>Traditional special dish</p>
        <button onclick="addToCart('Haleem')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x250/?biryani" alt="">
        <h3>Biryani</h3>
        <p>Rich & flavorful</p>
        <button onclick="addToCart('Biryani')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x250/?gulab-jamun" alt="">
        <h3>Gulab Jamun</h3>
        <p>Sweet dessert delight</p>
        <button onclick="addToCart('Gulab Jamun')">Add to Cart</button>
    </div>

</section>

<section class="cart">
    <h2>🛒 Your Cart</h2>
    <ul id="cart-list"></ul>
</section>

<footer>
    ✨ Wishing You a Blessed Ramadan ✨
</footer>

<script src="script.js"></script>
</body>
</html>
